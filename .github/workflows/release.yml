name: Build and Release Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        id: flutter-action
        with:
          architecture: x64
      - run: |
          git config --global --add safe.directory /opt/hostedtoolcache/flutter/${{ steps.flutter-action.outputs.CHANNEL }}-${{ steps.flutter-action.outputs.VERSION }}-${{ steps.flutter-action.outputs.ARCHITECTURE }}
          flutter --version
          
      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Generate Debug Keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -keyalg RSA -keysize 2048 -validity 10000 -alias androiddebugkey -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK
        run: flutter build apk --release

      - name: Extract Version
        id: get_version
        run: |
          version=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          version_name="${version%%+*}"
          build_number="${version#*+}"
          if [ "$build_number" = "$version" ]; then
            release_tag="v$version_name"
          else
            release_tag="v${version_name}-build.${build_number}"
          fi
          echo "version=$version" >> $GITHUB_ENV
          echo "release_tag=$release_tag" >> $GITHUB_ENV
          echo "Version extracted: $version"
          echo "Release tag: $release_tag"

      - name: Locate APK
        run: |
          apk_path=$(find build/app/outputs -type f -name "*.apk" | head -n 1)
          if [ -z "$apk_path" ]; then
            echo "No APK found under build/app/outputs"
            exit 1
          fi
          echo "apk_path=$apk_path" >> $GITHUB_ENV
          echo "Using APK: $apk_path"

      - name: Upload Release Artifact to GitHub
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ env.release_tag }}
          name: Nav Dashboard v${{ env.version }}
          artifacts: ${{ env.apk_path }}
          artifactContentType: application/vnd.android.package-archive
          draft: false
          prerelease: false
          allowUpdates: true
